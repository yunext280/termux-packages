name: Build EInkBot Bootstrap

on:
  workflow_dispatch:

jobs:
  build-bootstrap:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target_arch: [aarch64, arm, i686, x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Enable zram
        uses: ./.github/actions/zram
        with:
          algorithm: zstd
          size: 16G
          priority: 100
          device_name: /dev/zram0

      - name: Set up FUSE and Docker
        run: |
          sudo modprobe fuse || sudo modprobe fuse || true
          docker kill termux-package-builder 2>/dev/null || true
          docker rm termux-package-builder 2>/dev/null || true

      - name: Build bootstrap from source
        env:
          TERMUX_DOCKER_RUN_EXTRA_ARGS: "--device /dev/fuse --cap-add CAP_SYS_ADMIN --privileged"
        run: |
          ./scripts/run-docker.sh ./scripts/build-bootstrap-from-source.sh ${{ matrix.target_arch }}

      - name: Upload bootstrap artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-einkbot-${{ matrix.target_arch }}
          path: ./bootstrap-*.zip
          if-no-files-found: error

      - name: Cleanup
        if: always()
        run: docker rm -f termux-package-builder 2>/dev/null || true
