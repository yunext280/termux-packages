name: Build EInkBot Bootstrap from Source

on:
  workflow_dispatch:

jobs:
  build-bootstrap:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fix Executable Permissions
        run: |
          chmod +x scripts/*.sh

      - name: Custom Prefix injection (EInkBot Pack)
        run: |
          if [ -f properties.sh ]; then
            sed -i 's/TERMUX_APP_PACKAGE="com.termux"/TERMUX_APP_PACKAGE="com.einkbot"/g' properties.sh
            sed -i 's|TERMUX_PREFIX="/data/data/com.termux/files/usr"|TERMUX_PREFIX="/data/data/com.einkbot/files/usr"|g' properties.sh
            echo "Successfully injected com.einkbot prefix into properties.sh"
          else
            echo "Warning: properties.sh not found, looking into scripts..."
          fi

      - name: Install build dependencies
        run: ./scripts/setup-ubuntu.sh

      - name: Setup Android SDK and NDK
        run: ./scripts/setup-android-sdk.sh

      - name: Build bootstrap packages from source
        run: ./scripts/build-bootstrap-from-source.sh aarch64

      - name: Upload built .deb packages
        uses: actions/upload-artifact@v4
        with:
          name: debs-aarch64
          path: ./output/*.deb
          if-no-files-found: warn

      - name: Upload bootstrap artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap_einkbot_aarch64
          path: |
            ./bootstrap_einkbot_*.zip
            ./bootstrap_einkbot_*.tar.xz
            ./*.tar.xz
          if-no-files-found: warn
