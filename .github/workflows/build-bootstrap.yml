name: Build EInkBot Bootstrap

on:
  workflow_dispatch:

jobs:
  fix-bootstrap:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target_arch: [aarch64, arm, i686, x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y patchelf zip

      - name: Fix bootstrap paths for EInkBot
        run: ./scripts/fix-bootstrap-paths.sh ${{ matrix.target_arch }}

      - name: Upload bootstrap artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-einkbot-${{ matrix.target_arch }}
          path: ./bootstrap-einkbot-*.zip
          if-no-files-found: error
